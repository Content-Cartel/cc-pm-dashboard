<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CC · PM Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- TOP BAR -->
  <header id="topbar">
    <div class="topbar-left">
      <span class="logo-cc">CC</span><span class="logo-pm">PM</span>
    </div>
    <div class="topbar-center" id="statPills">
      <span class="stat-pill" id="pillClients">17 clients</span>
      <span class="stat-pill" id="pillProduction">8 in production</span>
      <span class="stat-pill" id="pillDeliverables">0/0 Long form videos done</span>
    </div>
    <div class="topbar-right"></div>
  </header>

  <!-- BACK NAV -->
  <nav id="mainnav">
    <a class="back-link" href="#/" id="backLink">← All Clients</a>
  </nav>

  <!-- MAIN CONTENT -->
  <main id="appRoot"></main>

  <script src="./app.js"></script>
</body>
</html>
